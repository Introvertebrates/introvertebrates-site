backend:
  name: github
  repo: Introvertebrates/introvertebrates-site
  branch: main
  base_url: https://curly-glitter-3880.erlend-706.workers.dev
  auth_endpoint: /auth

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: https://introvertebrates.com
display_url: https://introvertebrates.com

collections:
  - name: "research"
    label: "Research Updates"
    files:
      - label: "Research Entries"
        name: "research_entries"
        file: "_data/research.yml"
        fields:
          - label: "Entries"
            name: "entries"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Slug", name: "slug", widget: "string", required: false }
              - { label: "Category", name: "category", widget: "select", options: ["Behavior", "New species / Taxonomy", "General arachnology news", "Ecology", "Venom", "Captive relevance"] }
              - { label: "Posted date", name: "posted_date", widget: "string" }
              - { label: "Source date", name: "source_date", widget: "string" }
              - { label: "Summary", name: "summary", widget: "text" }
              - { label: "Why it matters", name: "why_it_matters", widget: "text" }
              - { label: "Source URL", name: "source_url", widget: "string" }
              - { label: "Source name", name: "source_name", widget: "string", required: false }
              - { label: "Body", name: "body", widget: "markdown", required: false }
