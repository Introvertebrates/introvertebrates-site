backend:
  name: github
  repo: E-Knu/introvertebrates-site
  branch: cms-migration

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: https://introvertebrates.com
display_url: https://introvertebrates.com

collections:
  - name: "research"
    label: "Research Updates"
    folder: "_research"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "research/{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Category", name: "category", widget: "select", options: ["Behavior", "New species / Taxonomy", "General arachnology news", "Ecology", "Venom", "Captive relevance"] }
      - { label: "Posted date", name: "posted_date", widget: "string" }
      - { label: "Source date", name: "source_date", widget: "string" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Why it matters", name: "why_it_matters", widget: "text" }
      - { label: "Source URL", name: "source_url", widget: "string" }
      - { label: "Source name", name: "source_name", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
